# 可选：启用自动保存（每小时一次）
set -g @resurrect-auto-save-interval '60'


# 将复制模式从emacs改为vim
set-window-option -g mode-keys vi

# Vim 绑定（tmux 2.6+ 语法）
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# 启用鼠标支持（点击切换窗格/窗口，滚动等）
set -g mouse on

# 重新加载配置快捷键：Ctrl-b + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# 设置默认 shell 为 zsh（登录 shell 以加载 .zshrc 和 P10k）
set-option -g default-shell $SHELL
set -g default-command "zsh -l"

# 状态栏美化（简单版）
set-option -g status-position top
set -g status-bg colour235
set -g status-fg colour136
set -g status-left '#[fg=green]#H #[fg=cyan]#S '
set -g status-right '#[fg=yellow]%Y-%m-%d %H:%M'

# 更合理的窗格编号
setw -g pane-base-index 1
set -g base-index 1


# M-p: 持久 shell popup
bind -n M-p display-popup -w 80% -h 80% -E \
  "tmux new-session -As popup-shell"

# M-g: 持久 lazygit（退出后保留 session）
bind -n M-g display-popup -w 90% -h 90% -E \
  "tmux new-session -As popup-lazygit -c '#{pane_current_path}' 'lazygit; exec zsh'"

# M-y: 持久 yazi（记住上次目录）
bind -n M-y display-popup -w 90% -h 90% -E "
  tmux new-session -As popup-yazi -c '#{pane_current_path}' \
  'cwd=\$(cat /tmp/yazi-cwd 2>/dev/null); [ -d \"\$cwd\" ] && cd \"\$cwd\"; yazi --cwd-file=/tmp/yazi-cwd; exec zsh'
"
# Prefix-a: 持久 claude popup
bind a display-popup -w 90% -h 90% -E \
  "tmux new-session -As popup-claude -c '#{pane_current_path}' 'claude; exec zsh'"

# ===== TPM 插件管理器 =====
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# 初始化 TPM（必须放在最后！）
run '~/.tmux/plugins/tpm/tpm'
